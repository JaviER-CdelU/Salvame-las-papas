<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#002A6A">
<title>Sin conexión — Sálvame las Papas</title>
<style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#002A6A;color:#fff;font-family:system-ui,sans-serif;padding:24px}
.card{max-width:520px;text-align:center;background:#fff;color:#172033;border-radius:24px;padding:32px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
img{width:128px;height:128px;border-radius:28px}
h1{margin:18px 0 8px}p{line-height:1.6;color:#586174}
button{border:0;border-radius:999px;background:#cc0000;color:#fff;font-weight:800;padding:13px 22px;cursor:pointer}

.password-contenedor{
  position:relative;
  width:100%;
}
.password-contenedor input[type="password"],
.password-contenedor input[type="text"]{
  width:100%;
  padding-right:54px !important;
}
.btn-ver-password{
  position:absolute;
  right:8px;
  top:50%;
  transform:translateY(-50%);
  width:40px !important;
  min-width:40px !important;
  height:36px;
  padding:0 !important;
  border:0;
  background:transparent;
  border-radius:8px;
  cursor:pointer;
  font-size:1.1rem;
  line-height:1;
}
.btn-ver-password:hover{background:rgba(0,0,0,.06)}


/* IDENTIFICACIÓN DE VERSIÓN — V26 */
.app-version-badge{
  position:fixed;
  right:12px;
  bottom:12px;
  z-index:9000;
  padding:7px 10px;
  border-radius:999px;
  background:rgba(5,43,101,.92);
  color:#fff;
  border:1px solid rgba(255,255,255,.32);
  box-shadow:0 5px 18px rgba(0,0,0,.18);
  font:800 .72rem/1 "DM Sans",Arial,sans-serif;
  letter-spacing:.03em;
}
.app-version-badge a{color:#ffd34e;text-decoration:none}
@media(max-width:600px){
  .app-version-badge{right:8px;bottom:8px;font-size:.66rem;padding:6px 8px}
}

</style>
<meta name="app-version" content="V42">
</head>
<body><main class="card">
<img src="./icons/icon-192.png" alt="Súper Papa">
<h1>Estás sin conexión</h1>
<p>La aplicación está instalada y puede abrirse, pero los datos nuevos, pedidos e inicio de sesión necesitan internet.</p>
<button onclick="location.reload()">Volver a intentar</button>
</main><script>
function alternarPassword(id, boton){
  const campo=document.getElementById(id);
  if(!campo) return;
  const mostrando=campo.type==='text';
  campo.type=mostrando?'password':'text';
  boton.textContent=mostrando?'👁️':'🙈';
  boton.setAttribute('aria-label', mostrando?'Mostrar contraseña':'Ocultar contraseña');
  boton.title=mostrando?'Mostrar contraseña':'Ocultar contraseña';
}

function prepararCamposPassword(){
  document.querySelectorAll('input[type="password"]').forEach((campo,indice)=>{
    if(campo.closest('.password-contenedor')) return;
    if(!campo.id) campo.id='password-campo-'+indice+'-'+Math.random().toString(36).slice(2,7);
    const cont=document.createElement('div');
    cont.className='password-contenedor';
    campo.parentNode.insertBefore(cont,campo);
    cont.appendChild(campo);
    const boton=document.createElement('button');
    boton.type='button';
    boton.className='btn-ver-password';
    boton.textContent='👁️';
    boton.title='Mostrar contraseña';
    boton.setAttribute('aria-label','Mostrar contraseña');
    boton.addEventListener('click',()=>alternarPassword(campo.id,boton));
    cont.appendChild(boton);
  });
}
document.addEventListener('DOMContentLoaded',prepararCamposPassword);
</script>

</body></html>
